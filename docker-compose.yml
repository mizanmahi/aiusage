services:
  postgres:
    image: postgres:16-alpine
    container_name: aiusage-postgres
    environment:
      POSTGRES_DB: aiusage
      POSTGRES_USER: aiusage
      POSTGRES_PASSWORD: aiusage
    ports:
      - "5432:5432" # i already have a postgres running on my machine, so I changed the port to 5433
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiusage -d aiusage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

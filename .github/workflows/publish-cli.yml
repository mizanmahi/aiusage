name: Publish CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.4.0
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            goos: linux
            goarch: amd64
            asset: aiusage_linux_amd64
          - name: macOS Apple Silicon
            goos: darwin
            goarch: arm64
            asset: aiusage_darwin_arm64
          - name: Windows x86_64
            goos: windows
            goarch: amd64
            asset: aiusage_windows_amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: cli/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -C cli -trimpath -ldflags "-s -w -X main.cliVersion=${RELEASE_TAG#v}" -o "../dist/${{ matrix.asset }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  upload:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
